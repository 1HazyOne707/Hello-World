name: Issue Analyzer

on:
  workflow_dispatch:
    inputs:
      issue:
        required: true
        type: number

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Analyze Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.inputs.issue }}
        run: |
          python3 << 'EOPY'
          import os, json, urllib.request

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          issue_num = os.environ["ISSUE_NUM"]

          def gh(path):
              req = urllib.request.Request(
                  f"https://api.github.com{path}",
                  headers={"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except:
                  return {}

          issue = gh(f"/repos/{repo}/issues/{issue_num}")
          comments = gh(f"/repos/{repo}/issues/{issue_num}/comments")
          repo_info = gh(f"/repos/{repo}")
          tree = gh(f"/repos/{repo}/git/trees/{repo_info.get('default_branch', 'main')}?recursive=1")
          
          claim_keywords = [
              "i'll take", "i will take", "i'm taking", "assign me", "assign this to me", 
              "claiming this", "i have claimed", "working on it", "starting work", 
              "started working", "on it now", "currently working", "picking this up",
              "i would like to work", "can i work", "would love to help", 
              "i'm interested in", "interested in taking", "let me handle",
              "drafting a pr", "starting a pr", "have a draft", "opening a pr"
          ]
          all_text = (issue.get("body", "") + " " + " ".join([c.get("body", "") for c in comments])).lower()
          is_claimed = any(k in all_text for k in claim_keywords)
          
          ignore_dirs = ("node_modules", ".github", "dist", "build", "venv", ".git")
          SOURCE_EXTS = (".py", ".go", ".rs", ".js", ".ts", ".tsx", ".jsx", ".java", ".c", ".cpp", ".h", ".sh")
          keywords = [word.strip(".,():[]`*#/") for word in (issue.get("title", "") + " " + issue.get("body", "")).lower().split() if len(word) > 4 and word.isalpha()]

          def calculate_score(fname, kw_list):
              if any(d in fname for d in ignore_dirs): return 0
              score = 0
              fparts = fname.lower().split('/')
              for k in kw_list:
                  if k in fparts[-1]: score += 3
                  elif k in fname: score += 1
              return score
          
          relevant = []
          for f in tree.get("tree", []):
              path = f.get("path", "")
              if path.endswith(SOURCE_EXTS):
                  score = calculate_score(path, keywords)
                  if score > 0: relevant.append((score, path))
          
          relevant.sort(reverse=True, key=lambda x: x[0])
          
          print(f"Status: {'CLAIMED' if is_claimed else 'AVAILABLE'}")
          print(f"Relevant files found: {len(relevant)}")
          for s, f in relevant[:10]:
              print(f"  [{s}] {f}")
          EOPY
